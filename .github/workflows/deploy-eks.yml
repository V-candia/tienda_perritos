name: CI/CD Tienda Perritos EKS

on:
  push:
    branches: [ master ]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPO_FRONTEND: tienda-perritos-frontend
  ECR_REPO_BACKEND: tienda-perritos-backend
  VERSION_TAG: v1.0.0

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Construir y publicar FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG} -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest -t $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${VERSION_TAG} ./frontend
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:latest
          docker push $ECR_REGISTRY/${ECR_REPO_FRONTEND}:${VERSION_TAG}

      - name: Construir y publicar BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG} -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest -t $ECR_REGISTRY/${ECR_REPO_BACKEND}:${VERSION_TAG} ./backend
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${IMAGE_TAG}
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:latest
          docker push $ECR_REGISTRY/${ECR_REPO_BACKEND}:${VERSION_TAG}

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Configurar kubeconfig para EKS
        env:
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME
          kubectl config current-context

      - name: Aplicar namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Preparar configuración de Kubernetes
        env:
          RDS_ENDPOINT: ${{ secrets.RDS_ENDPOINT }}
          RDS_USER: ${{ secrets.RDS_USER }}
          RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: tienda-backend-config
            namespace: tienda
          data:
            DB_HOST: ${RDS_ENDPOINT}
            DB_NAME: tienda_perritos
            DB_PORT: "3306"
          EOF

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: tienda-backend-secret
            namespace: tienda
          type: Opaque
          stringData:
            DB_USER: ${RDS_USER}
            DB_PASSWORD: ${RDS_PASSWORD}
          EOF

      - name: Renderizar manifests
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          mkdir -p /tmp/tienda-perritos-manifests
          sed -e "s|__ECR_REGISTRY__|$ECR_REGISTRY|g" -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" k8s/frontend-deployment.yaml > /tmp/tienda-perritos-manifests/frontend-deployment.yaml
          sed -e "s|__ECR_REGISTRY__|$ECR_REGISTRY|g" -e "s|__IMAGE_TAG__|$IMAGE_TAG|g" k8s/backend-deployment.yaml > /tmp/tienda-perritos-manifests/backend-deployment.yaml

      - name: Aplicar manifests de Kubernetes
        run: |
          kubectl apply -n tienda -f /tmp/tienda-perritos-manifests/backend-deployment.yaml
          kubectl apply -n tienda -f k8s/backend-service.yaml
          kubectl apply -n tienda -f /tmp/tienda-perritos-manifests/frontend-deployment.yaml
          kubectl apply -n tienda -f k8s/frontend-service.yaml
          kubectl apply -n tienda -f k8s/backend-hpa.yaml || true
          kubectl apply -n tienda -f k8s/frontend-hpa.yaml || true

      - name: Validar rollout BACKEND
        run: |
          kubectl rollout status deployment/tienda-backend -n tienda

      - name: Validar rollout FRONTEND
        run: |
          kubectl rollout status deployment/tienda-frontend -n tienda

      - name: Ver pods y servicios
        run: |
          kubectl get pods -n tienda
          kubectl get svc -n tienda
          kubectl get hpa -n tienda || true
