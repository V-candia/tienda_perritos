services:
  tienda-db:
    build:
      context: ./db
    container_name: tienda-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: tienda_perritos
      MYSQL_USER: alumno
      MYSQL_PASSWORD: alumno123
    ports:
      - "3306:3306"
    volumes:
      - tienda_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -padmin123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  tienda-backend:
    build:
      context: ./backend
    container_name: tienda-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: tienda-db
      DB_USER: root
      DB_PASSWORD: admin123
      DB_NAME: tienda_perritos
      DB_PORT: 3306
    depends_on:
      tienda-db:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3001/api/health').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  tienda-frontend:
    build:
      context: ./frontend
    container_name: tienda-frontend
    restart: unless-stopped
    depends_on:
      tienda-backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  tienda_db_data:
